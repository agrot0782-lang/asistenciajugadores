<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia Futbol - Terraflux</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { font-family: Arial; background: #f4f4f4; text-align: center; }
h1 { background: #2c3e50; color: white; padding: 10px; }
table { border-collapse: collapse; margin: auto; width: 95%; background: white; }
th { background: #2ecc71; color: white; }
th, td { border: 1px solid #ccc; padding: 8px; cursor: pointer; }
.ok { background: #27ae60; color: white; }
.falta { background: #ffa2a2; color: white; }
input { padding: 5px; margin: 5px; }
button { padding: 6px 12px; margin: 5px; cursor:pointer; }
</style>
</head>

<body>

<h1>📊 Asistencia Semanal - Terraflux</h1>

<h3>📅 Semana:</h3>
<select id="selectorSemana" onchange="cambiarSemana()"></select>

<br>
<button onclick="descargarExcel()">⬇ Descargar Excel</button>

<br><br>

<h3>➕ Agregar Jugador</h3>
<input id="nuevoNombre" placeholder="Nombre">
<input id="nuevoQR" placeholder="QR">
<input id="nuevoTraila" placeholder="Traila">
<input id="nuevoCelular" placeholder="Celular">
<input id="nuevoPosicion" placeholder="Posicion">
<button onclick="agregarJugador()">Agregar</button>

<table id="tabla">
<thead>
<tr>
<th>#</th>
<th>Nombre</th>
<th>QR</th>
<th>Traila</th>
<th>Celular</th>
<th>Posicion</th>
<th>Acciones</th>
<th>Lunes</th>
<th>Martes</th>
<th>Miércoles</th>
<th>Jueves</th>
<th>Viernes</th>
<th>Sábado</th>
<th>Domingo</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// 🔥 FIREBASE CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyA0J5FQsMU0XGhQ0WTD_M1iuXQ71T2caFs",
  authDomain: "terraflux-database.firebaseapp.com",
  databaseURL: "https://terraflux-database-default-rtdb.firebaseio.com",
  projectId: "terraflux-database",
  storageBucket: "terraflux-database.firebasestorage.app",
  messagingSenderId: "1055680733887",
  appId: "1:1055680733887:web:c3ce8a6547574b5a461c0a",
  measurementId: "G-NXT0XRRB07"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// 📅 SEMANA
function obtenerSemanaActual(){
    const hoy = new Date();
    const inicio = new Date(hoy.getFullYear(),0,1);
    const dias = Math.floor((hoy-inicio)/86400000);
    const semana = Math.ceil((dias+inicio.getDay()+1)/7);
    return `${hoy.getFullYear()}-S${semana}`;
}

let semanaActual = obtenerSemanaActual();

function rutaSemana(){
    return "asistencia/"+semanaActual;
}

const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

let empleados=[];

// 🔥 CARGAR JUGADORES
function cargarJugadores(callback){
    db.ref("jugadores").once("value",snap=>{
        empleados=[];
        let i=1;
        snap.forEach(child=>{
            let d=child.val();
            empleados.push({
                id:i++,
                nombre:d.nombre||"",
                traila:d.traila||"",
                celular:d.celular||"",
                posicion:d.posicion||"",
                qr:child.key
            });
        });
        callback();
    });
}

// ➕ AGREGAR
function agregarJugador(){

    let nombre=document.getElementById("nuevoNombre").value;
    let qr=document.getElementById("nuevoQR").value;
    let traila=document.getElementById("nuevoTraila").value;
    let celular=document.getElementById("nuevoCelular").value;
    let posicion=document.getElementById("nuevoPosicion").value;

    if(!nombre||!qr) return alert("Faltan datos");

    db.ref("jugadores/"+qr).set({
        nombre,traila,celular,posicion
    });

    alert("Jugador agregado ✅");

    cargarJugadores(()=>crearTabla());
}

// ✏️ EDITAR
function editarJugador(qr){

    db.ref("jugadores/"+qr).once("value",snap=>{

        let d=snap.val();

        let nombre=prompt("Nombre:",d.nombre);
        let traila=prompt("Traila:",d.traila);
        let celular=prompt("Celular:",d.celular);
        let posicion=prompt("Posicion:",d.posicion);

        if(!nombre) return;

        db.ref("jugadores/"+qr).update({
            nombre,traila,celular,posicion
        });

        alert("Actualizado ✅");
        cargarJugadores(()=>crearTabla());
    });
}

// 🗑️ BORRAR
function borrarJugador(qr){

    if(!confirm("¿Eliminar jugador?")) return;

    db.ref("jugadores/"+qr).remove()
    .then(()=>{
        alert("Eliminado ✅");
        cargarJugadores(()=>crearTabla());
    });
}

// 🔥 TABLA
function crearTabla(){
    db.ref(rutaSemana()).once("value",snap=>{

        let data=snap.val()||{};
        let tbody=document.querySelector("#tabla tbody");
        tbody.innerHTML="";

        empleados.forEach(emp=>{

            let tr=document.createElement("tr");

            let html=`
            <td>${emp.id}</td>
            <td>${emp.nombre}</td>
            <td>${emp.qr}</td>
            <td>${emp.traila}</td>
            <td>${emp.celular}</td>
            <td>${emp.posicion}</td>

            <td>
                <button onclick="editarJugador('${emp.qr}')">✏️</button>
                <button onclick="borrarJugador('${emp.qr}')">🗑️</button>
            </td>
            `;

            dias.forEach(d=>{
                let v=data[emp.qr]?.[d]||"";
                html+=`<td onclick="toggle('${emp.qr}','${d}')">${v}</td>`;
            });

            tr.innerHTML=html;
            tbody.appendChild(tr);
        });

        pintar();
    });
}

// 🔄 TOGGLE
function toggle(qr,dia){
    db.ref(rutaSemana()).once("value",snap=>{

        let data=snap.val()||{};
        if(!data[qr]) data[qr]={};

        let v=data[qr][dia];

        if(v==="✔️") data[qr][dia]="❌";
        else if(v==="❌") data[qr][dia]="";
        else data[qr][dia]="✔️";

        db.ref(rutaSemana()).set(data);
        cargarJugadores(()=>crearTabla());
    });
}

// 🎨 COLORES
function pintar(){
    document.querySelectorAll("#tabla td").forEach(td=>{
        if(td.innerText==="✔️") td.className="ok";
        else if(td.innerText==="❌") td.className="falta";
    });
}

// 📥 EXCEL
function descargarExcel(){
    db.ref(rutaSemana()).once("value",snap=>{

        let data=snap.val()||{};
        let exportar=[];

        empleados.forEach(emp=>{
            let fila={
                Nombre:emp.nombre,
                QR:emp.qr,
                Traila:emp.traila,
                Celular:emp.celular,
                Posicion:emp.posicion,
                Semana:semanaActual
            };

            dias.forEach(d=>{
                fila[d]=data[emp.qr]?.[d]||"";
            });

            exportar.push(fila);
        });

        let ws=XLSX.utils.json_to_sheet(exportar);
        let wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,"Asistencia");
        XLSX.writeFile(wb,"Asistencia_"+semanaActual+".xlsx");
    });
}

// 🚀 INIT
cargarJugadores(()=>crearTabla());

</script>

</body>
</html>
