<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia Semanal - Terraflux</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { font-family: Arial; background: #f4f4f4; text-align: center; }

h1 { background: #2c3e50; color: white; padding: 10px; }

table { border-collapse: collapse; margin: auto; width: 95%; background: white; }

th { background: #2ecc71; color: white; }

th, td { border: 1px solid #ccc; padding: 8px; cursor: pointer; }

.ok { background: #27ae60; color: white; }
.falta { background: #ffa2a2; color: white; }

input { padding: 5px; margin: 5px; }
button { padding: 6px 12px; margin: 5px; }
</style>
</head>

<body>

<h1>📊 Asistencia Semanal - Terraflux</h1>

<h3>📅 Semana:</h3>
<select id="selectorSemana" onchange="cambiarSemana()"></select>

<br>

<button onclick="descargarExcel()">⬇ Descargar Excel</button>

<br><br>

<h3>➕ Agregar Jugador</h3>
<input id="nuevoNombre" placeholder="Nombre">
<input id="nuevoQR" placeholder="QR">
<button onclick="agregarJugador()">Agregar</button>

<table id="tabla">
<thead>
<tr>
<th>#</th>
<th>Nombre</th>
<th>QR</th>
<th>Lunes</th>
<th>Martes</th>
<th>Miércoles</th>
<th>Jueves</th>
<th>Viernes</th>
<th>Sábado</th>
<th>Domingo</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// 🔥 CONFIG FIREBASE
var firebaseConfig = {
 apiKey: "AIzaSyA0J5FQsMU0XGhQ0WTD_M1iuXQ71T2caFs",
  authDomain: "terraflux-database.firebaseapp.com",
  databaseURL: "https://terraflux-database-default-rtdb.firebaseio.com",
  projectId: "terraflux-database",
  storageBucket: "terraflux-database.firebasestorage.app",
  messagingSenderId: "1055680733887",
  appId: "1:1055680733887:web:c3ce8a6547574b5a461c0a",
  measurementId: "G-NXT0XRRB07"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// 📅 SEMANA AUTOMÁTICA
function obtenerSemanaActual() {
    const hoy = new Date();
    const inicio = new Date(hoy.getFullYear(), 0, 1);
    const dias = Math.floor((hoy - inicio) / 86400000);
    const semana = Math.ceil((dias + inicio.getDay() + 1) / 7);
    return `${hoy.getFullYear()}-S${semana}`;
}

let semanaActual = obtenerSemanaActual();

function rutaSemana() {
    return "asistencia/" + semanaActual;
}

const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];

let empleados = [];

// 🔥 CARGAR JUGADORES DESDE FIREBASE
function cargarJugadores(callback) {
    db.ref("jugadores").once("value", snap => {

        empleados = [];
        let i = 1;

        snap.forEach(child => {
            let data = child.val();

            empleados.push({
                id: i++,
                nombre: data.nombre,
                qr: child.key
            });
        });

        callback();
    });
}

// ➕ AGREGAR JUGADOR
function agregarJugador() {
    let nombre = document.getElementById("nuevoNombre").value;
    let qr = document.getElementById("nuevoQR").value;

    if(!nombre || !qr) return alert("Faltan datos");

    db.ref("jugadores/" + qr).set({
        nombre: nombre
    });

    cargarJugadores(() => crearTabla());
}

// 🔥 CARGAR SEMANAS
function cargarSemanas() {
    db.ref("asistencia").once("value", snap => {

        const select = document.getElementById("selectorSemana");
        select.innerHTML = "";

        let semanas = [];

        snap.forEach(child => semanas.push(child.key));

        semanas.sort().reverse();

        if (!semanas.includes(semanaActual)) {
            semanas.unshift(semanaActual);
        }

        semanas.forEach(s => {
            let opt = document.createElement("option");
            opt.value = s;
            opt.text = s;
            if (s === semanaActual) opt.selected = true;
            select.appendChild(opt);
        });
    });
}

// 🔁 CAMBIAR SEMANA
function cambiarSemana() {
    semanaActual = document.getElementById("selectorSemana").value;
    cargarJugadores(() => crearTabla());
}

// 🔥 CREAR TABLA
function crearTabla() {
    db.ref(rutaSemana()).once("value", snap => {

        const data = snap.val() || {};
        const tbody = document.querySelector("#tabla tbody");

        tbody.innerHTML = "";

        empleados.forEach(emp => {

            let tr = document.createElement("tr");

            let html = `
                <td>${emp.id}</td>
                <td>${emp.nombre}</td>
                <td>${emp.qr}</td>
            `;

            dias.forEach(dia => {
                let estado = data[emp.qr]?.[dia] || "";
                html += `<td onclick="toggle('${emp.qr}','${dia}')">${estado}</td>`;
            });

            tr.innerHTML = html;
            tbody.appendChild(tr);
        });

        pintar();
    });
}

// 🔥 TOGGLE
function toggle(qr, dia) {
    db.ref(rutaSemana()).once("value", snap => {

        let data = snap.val() || {};

        if (!data[qr]) data[qr] = {};

        let valor = data[qr][dia];

        if (valor === "✔️") data[qr][dia] = "❌";
        else if (valor === "❌") data[qr][dia] = "";
        else data[qr][dia] = "✔️";

        db.ref(rutaSemana()).set(data);
        cargarJugadores(() => crearTabla());
    });
}

// 🎨 COLORES
function pintar() {
    document.querySelectorAll("#tabla td").forEach(td => {
        if (td.innerText === "✔️") td.className = "ok";
        else if (td.innerText === "❌") td.className = "falta";
    });
}

// 📥 EXCEL
function descargarExcel() {
    db.ref(rutaSemana()).once("value", snap => {

        const data = snap.val() || {};
        let exportar = [];

        empleados.forEach(emp => {
            let fila = {
                Nombre: emp.nombre,
                QR: emp.qr,
                Semana: semanaActual
            };

            dias.forEach(dia => {
                fila[dia] = data[emp.qr]?.[dia] || "";
            });

            exportar.push(fila);
        });

        const ws = XLSX.utils.json_to_sheet(exportar);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Asistencia");

        XLSX.writeFile(wb, "Asistencia_" + semanaActual + ".xlsx");
    });
}

// 🚀 INIT
cargarSemanas();
cargarJugadores(() => crearTabla());

</script>

</body>
</html>
