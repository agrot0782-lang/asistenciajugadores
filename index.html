<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Jugadores</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
}

th {
    background: #333;
    color: white;
}
</style>
</head>

<body>

<h2>📋 Lista de Jugadores</h2>

<table id="tabla">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Posición</th>
<th>Teléfono</th>
</tr>
</table>

<script>

// 🔥 PEGA TU CONFIG AQUÍ
const firebaseConfig = {
apiKey: "AIzaSyA0J5FQsMU0XGhQ0WTD_M1iuXQ71T2caFs",
  authDomain: "terraflux-database.firebaseapp.com",
  databaseURL: "https://terraflux-database-default-rtdb.firebaseio.com",
  projectId: "terraflux-database",
  storageBucket: "terraflux-database.firebasestorage.app",
  messagingSenderId: "1055680733887",
  appId: "1:1055680733887:web:c3ce8a6547574b5a461c0a",
  measurementId: "G-NXT0XRRB07"
};

firebase.initializeApp(firebaseConfig);
// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app)
const db = firebase.database();

// 🔥 SOLO LECTURA (NO BORRA NADA)
db.ref("jugadores").on("value", snap => {

    const tabla = document.getElementById("tabla");
    tabla.innerHTML = `
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Posición</th>
        <th>Teléfono</th>
    </tr>`;

    snap.forEach(child => {

        let data = child.val();

        tabla.innerHTML += `
        <tr>
            <td>${child.key}</td>
            <td>${data.nombre || ""}</td>
            <td>${data.posicion || ""}</td>
            <td>${data.telefono || ""}</td>
        </tr>`;
    });

});
</script>

</body>
</html>
